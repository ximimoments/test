; dracula colorscheme
[colors]
background = #282a36
background-alt = #44475a
foreground = #f8f8f2
primary = #bd93f9
secondary = #ffb86c
alert = #ff5555
disabled = #6272a4

[bar/i3bar]
width = 100%
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = "monospace:size=10:weight=bold;2"

modules-left = workspaces
modules-center = xwindow
modules-right = cpu mem net audio date

module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

[module/workspaces]
type = internal/xworkspaces
; Aqu√≠ le ponemos los corchetes para que parezca un bot√≥n con borde
label-active = [%name%]
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}

label-empty = %name%
label-empty-foreground = ${colors.disabled}

label-padding = 1

[module/cpu]
type = internal/cpu
label = CPU %percentage%%
label-foreground = ${colors.secondary}

[module/mem]
type = internal/memory
label = RAM %percentage_used%%
label-foreground = ${colors.secondary}

[module/net]
type = internal/network
interface-type = wireless
label-connected = NET UP
label-connected-foreground = ${colors.primary}
label-disconnected = NET DOWN
label-disconnected-foreground = ${colors.alert}

[module/audio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = VOL %percentage%%
label-volume-foreground = ${colors.primary}
label-muted = VOL MUTE
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.primary}
