# backend 
backend = "xrender";
experimental-backend = false;

# vsync to eliminate tearing
vsync = true;

# ensure fences are synced
xrender-sync-fence = true;

# Shadows
shadow = true;
shadow-radius = 12; # blur radius
shadow-offset-x = -10;
shadow-offset-y = 10;
shadow-opacity = 0.6;

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# Fading (for popups, menus)
fading = true;
fade-delta = 4; # speed of fade
fade-in-step = 0.03;
fade-out-step = 0.03;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;

# Logging
log-level = "info";
